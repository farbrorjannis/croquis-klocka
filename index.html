<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kroki Timer – akvarellskiss.se</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:   #faf7f2;
    --paper2:  #f5f0e8;
    --paper3:  #ede6d8;
    --ink:     #2c2218;
    --ink2:    #6b5540;
    --ink3:    #a8926e;
    --gold:    #c8971c;
    --gold-lt: #e8be5a;
    --red:     #b83030;
    --border:  #ddd4c2;
    --shadow:  rgba(80,50,20,.10);
    --btn-h:   54px;
    --r:       12px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body {
    background:var(--paper);
    color:var(--ink);
    font-family:'Jost',sans-serif;
    min-height:100vh;
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 20%,rgba(200,151,28,.06) 0%,transparent 70%),
      radial-gradient(ellipse 50% 60% at 85% 70%,rgba(184,48,48,.04) 0%,transparent 70%),
      radial-gradient(ellipse 80% 50% at 50% 100%,rgba(168,146,110,.07) 0%,transparent 60%);
  }
  #app {
    position:relative; z-index:1;
    max-width:440px; margin:0 auto;
    padding:2rem 1.4rem 4rem;
  }
  .v { display:none; }
  .v.on { display:block; animation:fadeUp .35s ease; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Brand */
  .brand {
    display:flex; align-items:center; gap:10px;
    margin-bottom:2rem; padding-bottom:1rem;
    border-bottom:1px solid var(--border);
  }
  .brand-logo {
    width:38px; height:38px; border-radius:50%;
    background:var(--ink);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .brand-logo svg { width:22px; height:22px; }
  .brand-name {
    font-family:'Cormorant Garamond',serif;
    font-size:18px; font-weight:600; color:var(--ink); line-height:1.1;
  }
  .brand-sub { font-size:11px; color:var(--ink3); letter-spacing:.08em; text-transform:uppercase; }

  .page-title {
    font-family:'Cormorant Garamond',serif;
    font-size:30px; font-weight:600; margin-bottom:.25rem;
  }
  .page-sub { font-size:14px; color:var(--ink2); margin-bottom:1.6rem; font-weight:300; }

  /* Buttons */
  button {
    font-family:'Jost',sans-serif;
    font-size:15px; font-weight:500;
    height:var(--btn-h); padding:0 22px;
    border-radius:var(--r); border:none; cursor:pointer;
    transition:transform .1s,box-shadow .15s,background .15s;
    letter-spacing:.02em;
  }
  button:active { transform:scale(.97); }
  .btn-primary {
    background:var(--ink); color:var(--paper); width:100%;
    font-size:16px; font-weight:600;
    box-shadow:0 3px 12px rgba(44,34,24,.25);
  }
  .btn-primary:hover { background:#3d2e1e; }
  .btn-primary:disabled {
    background:var(--paper3); color:var(--ink3);
    box-shadow:none; cursor:not-allowed; transform:none;
  }
  .btn-outline {
    background:#fff; color:var(--ink);
    border:1.5px solid var(--border);
    box-shadow:0 1px 4px var(--shadow);
  }
  .btn-outline:hover { border-color:var(--ink2); }
  .btn-ghost {
    background:none; color:var(--ink2);
    border:1.5px solid var(--border);
    height:44px; font-size:14px; padding:0 16px;
  }

  /* Inputs */
  input[type=number] {
    font-family:'Jost',sans-serif;
    background:var(--paper2); border:1.5px solid var(--border); border-radius:10px;
    color:var(--ink); font-size:18px; font-weight:600;
    padding:0 14px; height:52px; outline:none;
    -moz-appearance:textfield; transition:border-color .15s;
  }
  input[type=number]:focus { border-color:var(--ink2); }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
  input[type=range] {
    -webkit-appearance:none; appearance:none;
    width:100%; height:6px;
    background:var(--paper3); border-radius:3px;
    outline:none; border:none; padding:0; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none;
    width:28px; height:28px; border-radius:50%;
    background:var(--ink); border:3px solid var(--paper);
    box-shadow:0 1px 6px rgba(44,34,24,.3);
  }

  /* Session list */
  #slist { max-height:220px; overflow-y:auto; margin-bottom:1.2rem; }
  .srow {
    display:flex; align-items:center; gap:10px;
    padding:11px 14px; background:var(--paper2);
    border-radius:10px; margin-bottom:7px; border:1px solid var(--border);
  }
  .sbadge {
    background:var(--ink); color:var(--paper);
    font-size:13px; font-weight:600;
    padding:4px 13px; border-radius:20px; flex-shrink:0;
  }
  .srow-label { font-size:14px; color:var(--ink2); }
  .del-btn {
    margin-left:auto; background:none; border:none; box-shadow:none;
    cursor:pointer; font-size:16px; color:var(--ink3);
    height:auto; padding:4px 8px; transition:color .15s;
  }
  .del-btn:hover { color:var(--red); }

  /* Dots */
  .dots { display:flex; gap:8px; justify-content:center; margin-top:1.2rem; flex-wrap:wrap; }
  .dot {
    width:11px; height:11px; border-radius:50%;
    background:var(--paper3); border:1.5px solid var(--border);
    transition:background .4s,box-shadow .4s;
  }
  .dot.done { background:var(--ink3); border-color:var(--ink3); }
  .dot.act  { background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px rgba(200,151,28,.5); }

  /* Layout helpers */
  .row         { display:flex; gap:10px; align-items:center; }
  .row-between { display:flex; justify-content:space-between; align-items:center; }
  hr { border:none; border-top:1px solid var(--border); margin:1.3rem 0; }

  /* Timer */
  #slbl { font-size:15px; font-weight:500; color:var(--ink2); }
  canvas { display:block; margin:.6rem auto; }
  .ctls { display:flex; gap:10px; justify-content:center; margin-top:1rem; }
  .ctls button { flex:1; }

  /* Sound btn */
  #sndbtn {
    background:var(--paper2); border:1px solid var(--border);
    border-radius:10px; padding:0 14px;
    font-size:13px; color:var(--ink2); height:40px;
    display:flex; align-items:center; gap:5px;
  }

  /* Clock wrap */
  .clock-wrap {
    position:relative; display:flex; justify-content:center;
  }
  .clock-wrap::before {
    content:''; position:absolute;
    width:320px; height:320px; border-radius:50%;
    background:radial-gradient(circle,rgba(200,151,28,.07) 0%,transparent 70%);
    top:50%; left:50%; transform:translate(-50%,-50%);
    pointer-events:none;
  }

  /* Break */
  #vb { text-align:center; padding:2.5rem 0; }
  .break-label {
    font-family:'Cormorant Garamond',serif;
    font-size:13px; letter-spacing:.15em; text-transform:uppercase;
    color:var(--ink3); margin-bottom:.5rem;
  }
  .break-num {
    font-family:'Cormorant Garamond',serif;
    font-size:100px; font-weight:600; color:var(--ink);
    line-height:1; letter-spacing:-.02em;
  }
  .break-unit { font-size:13px; color:var(--ink3); margin:.3rem 0 1.8rem; letter-spacing:.05em; }

  /* Done */
  #vd { text-align:center; padding:3.5rem 0; }
  .done-title {
    font-family:'Cormorant Garamond',serif;
    font-size:34px; font-weight:600; margin-bottom:.4rem;
  }
  #dsum { font-size:15px; color:var(--ink2); margin-bottom:2.2rem; font-weight:300; }

  #wakeinfo { font-size:11px; color:var(--ink3); text-align:center; margin-top:.6rem; }
</style>
</head>
<body>
<div id="app">

<!-- BRAND -->
<div class="brand">
  <div class="brand-logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 20c2-4 5-7 9-8.5M12 11.5c2-1 5-1.5 7-4.5-3 .5-5 2-7 4.5z"
        stroke="#faf7f2" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="11.5" cy="12" r="1.2" fill="#c8971c"/>
    </svg>
  </div>
  <div>
    <div class="brand-name">akvarellskiss.se</div>
    <div class="brand-sub">Kroki Timer · ArtLab</div>
  </div>
</div>

<!-- SETUP -->
<div id="vs" class="v on">
  <p class="page-title">Kroki Timer</p>
  <p class="page-sub">Lägg till poser, välj pauslängd och starta.</p>

  <div id="slist">
    <p style="font-size:14px;color:var(--ink3);text-align:center;padding:1.2rem 0;font-style:italic">Inga sessioner ännu.</p>
  </div>

  <div class="row" style="margin-bottom:1.3rem">
    <input type="number" id="din" min="1" max="60" value="5" style="width:78px">
    <span style="font-size:15px;color:var(--ink2);font-weight:300">min per pose</span>
    <button class="btn-outline" onclick="addS()" style="flex:1">+ Lägg till</button>
  </div>

  <hr>

  <div style="margin-bottom:1.8rem">
    <div class="row-between" style="margin-bottom:12px">
      <span style="font-size:15px;color:var(--ink2)">Paus mellan poser</span>
      <span id="blbl" style="font-size:19px;font-weight:600;color:var(--gold);font-family:'Cormorant Garamond',serif">20 s</span>
    </div>
    <input type="range" id="bin" min="5" max="60" value="20" step="1"
      oninput="S.brk=+this.value;document.getElementById('blbl').textContent=this.value+' s'">
    <div class="row-between" style="margin-top:6px">
      <span style="font-size:11px;color:var(--ink3)">5 s</span>
      <span style="font-size:11px;color:var(--ink3)">60 s</span>
    </div>
  </div>

  <button id="gobtn" class="btn-primary" onclick="startAll()" disabled>▶&ensp;Starta session</button>
  <div id="wakeinfo"></div>
</div>

<!-- TIMER -->
<div id="vt" class="v">
  <div class="row-between" style="margin-bottom:.6rem">
    <span id="slbl"></span>
    <button id="sndbtn" onclick="togSound()">
      <span id="sndico">♪</span><span id="sndtxt">&thinsp;Ljud på</span>
    </button>
  </div>
  <div class="clock-wrap">
    <canvas id="clk" width="290" height="290"></canvas>
  </div>
  <div class="ctls">
    <button id="pbtn" class="btn-outline" onclick="togPause()">⏸&ensp;Paus</button>
    <button class="btn-ghost" onclick="skipS()">Hoppa&thinsp;↗</button>
  </div>
  <div class="dots" id="tdots"></div>
</div>

<!-- BREAK -->
<div id="vb" class="v">
  <p class="break-label">Byt pose</p>
  <div class="break-num" id="bdisp">20</div>
  <p class="break-unit">sekunder kvar</p>
  <button class="btn-primary" style="max-width:260px;margin:0 auto;display:block" onclick="skipB()">Hoppa paus&thinsp;↗</button>
  <div class="dots" id="bdots" style="margin-top:1.8rem"></div>
</div>

<!-- DONE -->
<div id="vd" class="v">
  <p style="font-size:36px;margin-bottom:.5rem">🎨</p>
  <p class="done-title">Bra jobbat!</p>
  <p id="dsum"></p>
  <button class="btn-primary" style="max-width:260px;margin:0 auto;display:block" onclick="resetApp()">Nytt program</button>
</div>

</div>

<script>
const S={sessions:[],brk:20,idx:0,mode:'setup',t0:null,pm:0,pauseAt:null};
let anim=null,tock=null,soundOn=true,acx=null,beat=0,wakeLock=null;

async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{wakeLock=null;});
      setWakeInfo('● Skärmen hålls vaken');
    }else setWakeInfo('⚠ WakeLock stöds ej av din webbläsare');
  }catch(e){setWakeInfo('⚠ Kunde ej hålla skärmen vaken');}
}
function releaseWakeLock(){if(wakeLock){wakeLock.release();wakeLock=null;}setWakeInfo('');}
function setWakeInfo(m){const e=document.getElementById('wakeinfo');if(e)e.textContent=m;}

document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState==='visible'){
    if((S.mode==='run'||S.mode==='brk')&&!wakeLock)await requestWakeLock();
    stopA();
    if(S.mode==='run'&&!S.pauseAt)loop();
    if(S.mode==='brk')loopB();
  }
});

function getAC(){
  if(!acx)acx=new(window.AudioContext||window.webkitAudioContext)();
  if(acx.state==='suspended')acx.resume();
  return acx;
}
function playTick(){
  try{
    const ac=getAC(),t=ac.currentTime;
    const buf=ac.createBuffer(1,ac.sampleRate*0.04,ac.sampleRate);
    const d=buf.getChannelData(0);
    const freq=beat%2===0?1200:900;beat++;
    for(let i=0;i<d.length;i++)
      d[i]=Math.sin(2*Math.PI*freq*i/ac.sampleRate)*Math.exp(-i/(ac.sampleRate*0.008))*0.35;
    const src=ac.createBufferSource();src.buffer=buf;
    src.connect(ac.destination);src.start(t);
  }catch(e){}
}
function togSound(){
  soundOn=!soundOn;
  document.getElementById('sndico').textContent='♪';
  document.getElementById('sndtxt').textContent=soundOn?' Ljud på':' Ljud av';
  document.getElementById('sndbtn').style.opacity=soundOn?'1':'0.45';
  if(!soundOn){clearInterval(tock);tock=null;}
  else if(S.mode==='run'&&!S.pauseAt)startTock();
}
function startTock(){
  if(!soundOn)return;clearInterval(tock);playTick();
  tock=setInterval(()=>{if(soundOn&&S.mode==='run'&&!S.pauseAt)playTick();},1000);
}
function stopTock(){clearInterval(tock);tock=null;}
function chime(end){
  try{
    const ac=getAC();
    const notes=end?[[523,0],[659,.2],[784,.4],[1047,.65]]:[[880,0],[1100,.18],[880,.36]];
    notes.forEach(([f,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      const t=ac.currentTime+d;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.28,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.75);
      o.start(t);o.stop(t+0.8);
    });
  }catch(e){}
}

function elapsed(){
  if(S.t0===null)return 0;
  let ms=Date.now()-S.t0-S.pm;
  if(S.pauseAt)ms-=(Date.now()-S.pauseAt);
  return Math.max(0,ms/1000);
}

function addS(){
  const v=Math.max(1,Math.min(60,+document.getElementById('din').value||5));
  S.sessions.push(v);renderList();
}
function delS(i){S.sessions.splice(i,1);renderList();}
function renderList(){
  const el=document.getElementById('slist');
  if(!S.sessions.length){
    el.innerHTML='<p style="font-size:14px;color:var(--ink3);text-align:center;padding:1.2rem 0;font-style:italic">Inga sessioner ännu.</p>';
    document.getElementById('gobtn').disabled=true;return;
  }
  el.innerHTML=S.sessions.map((s,i)=>`
    <div class="srow">
      <span class="sbadge">${s} min</span>
      <span class="srow-label">Pose ${i+1}</span>
      <button class="del-btn" onclick="delS(${i})">✕</button>
    </div>`).join('');
  document.getElementById('gobtn').disabled=false;
}

async function startAll(){
  if(!S.sessions.length)return;
  try{getAC();}catch(e){}
  S.idx=0;await requestWakeLock();begSess();
}
function begSess(){
  S.mode='run';S.t0=Date.now();S.pauseAt=null;S.pm=0;
  showV('vt');beat=0;startTock();
  document.getElementById('pbtn').textContent='⏸\u2002Paus';
  document.getElementById('slbl').textContent=`Pose ${S.idx+1} av ${S.sessions.length} · ${S.sessions[S.idx]} min`;
  mkDots('tdots');stopA();loop();
}
function begBreak(){
  if(S.idx>=S.sessions.length-1){alldone();return;}
  S.mode='brk';S.t0=Date.now();S.pauseAt=null;S.pm=0;
  stopTock();showV('vb');mkDots('bdots');stopA();loopB();
}
function alldone(){
  S.mode='done';stopA();stopTock();releaseWakeLock();showV('vd');
  const n=S.sessions.length,tot=S.sessions.reduce((a,b)=>a+b,0);
  document.getElementById('dsum').textContent=`${n} pos${n>1?'er':''} · ${tot} min totalt`;
  chime(true);
}

function loop(){
  const tot=S.sessions[S.idx]*60,e=elapsed();
  drawClock(e,tot);
  if(e>=tot){chime(false);stopTock();setTimeout(begBreak,500);return;}
  anim=requestAnimationFrame(loop);
}
function loopB(){
  const rem=Math.max(S.brk-elapsed(),0);
  document.getElementById('bdisp').textContent=Math.ceil(rem);
  if(rem<=0){S.idx++;begSess();return;}
  anim=requestAnimationFrame(loopB);
}
function stopA(){if(anim){cancelAnimationFrame(anim);anim=null;}}

setInterval(()=>{
  if(S.mode==='run'&&!S.pauseAt){
    const e=elapsed(),tot=S.sessions[S.idx]*60;
    if(e>=tot){stopA();chime(false);stopTock();setTimeout(begBreak,500);}
    else if(!anim)loop();
  }
  if(S.mode==='brk'){
    if(Math.max(S.brk-elapsed(),0)<=0){stopA();S.idx++;begSess();}
    else if(!anim)loopB();
  }
},2000);

function togPause(){
  if(S.mode!=='run')return;
  const btn=document.getElementById('pbtn');
  if(S.pauseAt){
    S.pm+=Date.now()-S.pauseAt;S.pauseAt=null;
    btn.textContent='⏸\u2002Paus';startTock();loop();
  }else{
    S.pauseAt=Date.now();stopA();stopTock();
    btn.textContent='▶\u2002Fortsätt';
  }
}
function skipS(){stopA();stopTock();chime(false);setTimeout(begBreak,200);}
function skipB(){stopA();S.idx++;begSess();}
function resetApp(){stopA();stopTock();releaseWakeLock();S.sessions=[];S.idx=0;S.mode='setup';renderList();showV('vs');}

function drawClock(e,total){
  const cv=document.getElementById('clk');
  const ctx=cv.getContext('2d');
  const cx=145,cy=145,R=138;
  ctx.clearRect(0,0,cv.width,cv.height);

  ctx.save();
  ctx.shadowColor='rgba(80,50,20,.15)';ctx.shadowBlur=20;
  ctx.beginPath();ctx.arc(cx,cy,R-2,0,Math.PI*2);
  ctx.fillStyle='#ffffff';ctx.fill();
  ctx.restore();

  ctx.beginPath();ctx.arc(cx,cy,R-2,0,Math.PI*2);
  ctx.fillStyle='#fdfaf5';ctx.fill();

  // Elapsed arc
  const prog=Math.min(e/total,1);
  ctx.beginPath();
  ctx.arc(cx,cy,R-10,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
  ctx.strokeStyle='rgba(200,151,28,.18)';ctx.lineWidth=18;ctx.stroke();

  // Border
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='#2c2218';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,R-4,0,Math.PI*2);
  ctx.strokeStyle='rgba(221,212,194,.6)';ctx.lineWidth=1;ctx.stroke();

  // Ticks
  for(let i=0;i<60;i++){
    const a=i/60*Math.PI*2-Math.PI/2;
    const isMaj=(i%6===0);
    const r1=R-4,r2=isMaj?R-20:R-13;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);
    ctx.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);
    ctx.strokeStyle=isMaj?'#2c2218':'#c8b898';
    ctx.lineWidth=isMaj?2.5:1.2;ctx.stroke();
  }

  // Numbers
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let n=1;n<=10;n++){
    const idx=n%10;
    const a=idx/10*Math.PI*2-Math.PI/2;
    const nr=R-38;
    ctx.font="600 17px 'Jost',sans-serif";
    ctx.fillStyle='#2c2218';
    ctx.fillText(String(n),cx+Math.cos(a)*nr,cy+Math.sin(a)*nr);
  }

  // Brand
  ctx.font="italic 400 11px 'Cormorant Garamond',serif";
  ctx.fillStyle='#a8926e';
  ctx.fillText('akvarellskiss.se',cx,cy+34);
  ctx.font="300 9px 'Jost',sans-serif";
  ctx.fillStyle='#c8b898';
  ctx.fillText('KROKI TIMER',cx,cy+47);

  // Hands
  const mAng=(e/total)*Math.PI*2-Math.PI/2;
  drawHand(ctx,cx,cy,mAng,88,7,'#2c2218');
  const sAng=(e%60)/60*Math.PI*2-Math.PI/2;
  drawSecHand(ctx,cx,cy,sAng);

  // Center
  ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);ctx.fillStyle='#2c2218';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fillStyle='#c8971c';ctx.fill();
}

function drawHand(ctx,cx,cy,a,len,w,col){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(a+Math.PI/2);
  ctx.beginPath();
  ctx.moveTo(-w/2,len*0.15);ctx.lineTo(-w/2,-len*0.8);
  ctx.quadraticCurveTo(0,-len,w/2,-len*0.8);
  ctx.lineTo(w/2,len*0.15);ctx.closePath();
  ctx.shadowColor='rgba(44,34,24,.2)';ctx.shadowBlur=6;
  ctx.fillStyle=col;ctx.fill();ctx.restore();
}
function drawSecHand(ctx,cx,cy,a){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(a+Math.PI/2);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,30);
  ctx.strokeStyle='#c8971c';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-108);
  ctx.strokeStyle='#c8971c';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(0,-86,7,0,Math.PI*2);
  ctx.shadowColor='rgba(200,151,28,.4)';ctx.shadowBlur=8;
  ctx.fillStyle='#c8971c';ctx.fill();ctx.restore();
}

function mkDots(id){
  const c=document.getElementById(id);if(!c)return;
  c.innerHTML=S.sessions.map((_,i)=>
    `<div class="dot ${i<S.idx?'done':i===S.idx?'act':''}"></div>`).join('');
}
function showV(id){
  ['vs','vt','vb','vd'].forEach(v=>document.getElementById(v).classList.toggle('on',v===id));
}
renderList();
</script>
