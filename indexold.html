<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jannis Croquis Timer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap');
    
    body {
      margin: 0;
      height: 100vh;
      background: #1a1429;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #eee;
    }

    .clock {
      width: 460px;
      height: 460px;
      background: white;
      border: 24px solid #111;
      border-radius: 50%;
      position: relative;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }

    .title {
      position: absolute;
      top: 185px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 2.8px;
      color: #e63946;
      white-space: nowrap;
    }

    .session-hand, .second-hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 999px;
    }

    .session-hand {
      width: 9px;
      height: 175px;
      background: #111;
      margin-left: -4.5px;
    }

    .second-hand {
      width: 3px;
      height: 205px;
      background: #e63946;
      margin-left: -1.5px;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 26px;
      height: 26px;
      background: #111;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    .countdown {
      margin-top: 45px;
      font-size: 88px;
      font-weight: 500;
      color: #ddd;
      letter-spacing: -5px;
    }

    .info {
      margin-top: 10px;
      font-size: 21px;
    }
  </style>
</head>
<body>

  <div class="clock">
    <div class="title">JANNIS CROQUIS TIMER</div>
    
    <div class="session-hand" id="sessionHand"></div>
    <div class="second-hand" id="secondHand"></div>
    
    <div class="center"></div>
  </div>

  <div class="countdown" id="countdown">10:00</div>
  <div class="info" id="info">Session 1 / 1 • 10 min</div>

  <div style="margin-top:30px;">
    <input type="text" id="sessionsInput" placeholder="Tider i minuter, t.ex. 5,8,3,10" style="width:350px;padding:12px;font-size:16px;">
    <button onclick="setSessions()" style="padding:12px 22px;">Sätt sessioner</button><br><br>
    <button onclick="toggleTimer()" style="padding:14px 32px;font-size:17px;">Start / Pause</button>
  </div>

  <script>
    let currentTime = 600;
    let totalSeconds = 600;
    let isRunning = false;
    let timerInterval = null;

    const sessionHand = document.getElementById('sessionHand');
    const secondHand = document.getElementById('secondHand');
    const countdownEl = document.getElementById('countdown');
    const infoEl = document.getElementById('info');
    const input = document.getElementById('sessionsInput');

    function updateHands() {
      // Session hand (10 min = 360°)
      const sessionDeg = 360 * (1 - currentTime / totalSeconds);
      sessionHand.style.transform = `rotate(${sessionDeg}deg)`;

      // Sekundvisare – medurs
      const secondDeg = (currentTime % 60) * 6;
      secondHand.style.transform = `rotate(${secondDeg}deg)`;
    }

    function updateDisplay() {
      const m = Math.floor(currentTime / 60);
      const s = currentTime % 60;
      countdownEl.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
      updateHands();
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (currentTime > 0) {
          currentTime--;
          updateDisplay();
        } else {
          clearInterval(timerInterval);
          // Larm
          const audio = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audio.createOscillator();
          osc.frequency.value = 650;
          osc.connect(audio.destination);
          osc.start();
          setTimeout(() => osc.stop(), 500);
        }
      }, 1000);
    }

    function toggleTimer() {
      isRunning = !isRunning;
      if (isRunning) startTimer();
      else clearInterval(timerInterval);
    }

    function setSessions() {
      const val = input.value.trim();
      if (!val) return;
      const newSessions = val.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n > 0 && n <= 10);
      if (newSessions.length > 0) {
        currentTime = newSessions[0] * 60;
        totalSeconds = currentTime;
        infoEl.textContent = `Session 1 / ${newSessions.length} • ${newSessions[0]} min`;
        updateDisplay();
      }
    }

    // Start
    updateDisplay();
  </script>
</body>
</html>
