<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jannis Croquis Timer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap');
    
    body {
      margin: 0;
      height: 100vh;
      background: #1a1429;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #eee;
    }

    .clock-container {
      position: relative;
      width: 460px;
      height: 460px;
    }

    .clock {
      width: 100%;
      height: 100%;
      background: white;
      border: 22px solid #111;
      border-radius: 50%;
      position: relative;
      box-shadow: 0 30px 70px rgba(0,0,0,0.65);
    }

    .title {
      position: absolute;
      top: 172px;                 /* mycket längre ner, nära centrum */
      left: 50%;
      transform: translateX(-50%);
      font-size: 18.5px;
      font-weight: 600;
      letter-spacing: 2.5px;
      color: #e63946;
      white-space: nowrap;
      z-index: 10;
    }

    .hand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
    }

    .session-hand {
      width: 8px;
      height: 172px;
      background: #111;
      border-radius: 4px;
      margin-top: -172px;
      margin-left: -4px;
    }

    .second-hand {
      width: 3px;
      height: 198px;
      background: #e63946;
      margin-top: -198px;
      margin-left: -1.5px;
    }

    .center-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 24px;
      height: 24px;
      background: #111;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
    }

    .countdown {
      margin-top: 40px;
      font-size: 82px;
      font-weight: 500;
      letter-spacing: -4px;
      color: #ddd;
    }

    .info {
      margin-top: 12px;
      font-size: 20px;
      opacity: 0.9;
    }

    .controls {
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <div class="clock-container">
    <div class="clock" id="clock">
      <div class="title">JANNIS CROQUIS TIMER</div>

      <div class="hand session-hand" id="sessionHand"></div>
      <div class="hand second-hand" id="secondHand"></div>

      <div class="center-dot"></div>
    </div>
  </div>

  <div class="countdown" id="countdown">10:00</div>
  <div class="info" id="info">Session 1 / 1 • 10 min</div>

  <div class="controls">
    <input type="text" id="sessionsInput" placeholder="Tider i minuter, t.ex. 5,8,3,10" style="width:340px; padding:12px; font-size:16px;">
    <button onclick="setSessions()" style="padding:12px 20px;">Sätt sessioner</button><br><br>
    <button onclick="toggleTimer()" style="padding:12px 28px; font-size:17px;">Start / Pause</button>
  </div>

  <script>
    let sessions = [10];
    let currentSessionIndex = 0;
    let currentTime = 600;
    let totalSeconds = 600;
    let isRunning = false;
    let timerInterval = null;

    const sessionHand = document.getElementById('sessionHand');
    const secondHand = document.getElementById('secondHand');
    const countdownEl = document.getElementById('countdown');
    const infoEl = document.getElementById('info');
    const sessionsInput = document.getElementById('sessionsInput');

    function updateHands() {
      const progress = currentTime / totalSeconds;
      const sessionDeg = 360 * (1 - progress);
      sessionHand.style.transform = `rotate(${sessionDeg}deg)`;

      const secondDeg = (currentTime % 60) * 6;
      secondHand.style.transform = `rotate(${secondDeg}deg)`;
    }

    function updateDisplay() {
      const m = Math.floor(currentTime / 60);
      const s = currentTime % 60;
      countdownEl.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
      updateHands();
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (currentTime > 0) {
          currentTime--;
          updateDisplay();
        } else {
          clearInterval(timerInterval);
          // enkelt larm
          const audio = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audio.createOscillator();
          osc.frequency.value = 680;
          osc.connect(audio.destination);
          osc.start();
          setTimeout(() => osc.stop(), 400);
        }
      }, 1000);
    }

    function toggleTimer() {
      isRunning = !isRunning;
      if (isRunning) startTimer();
      else clearInterval(timerInterval);
    }

    function setSessions() {
      const val = sessionsInput.value.trim();
      if (!val) return;
      sessions = val.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n > 0 && n <= 10);
      if (sessions.length > 18) sessions = sessions.slice(0,18);
      
      currentSessionIndex = 0;
      currentTime = sessions[0] * 60;
      totalSeconds = currentTime;
      infoEl.textContent = `Session 1 / ${sessions.length} • ${sessions[0]} min`;
      updateDisplay();
    }

    // Init
    updateDisplay();
    infoEl.textContent = `Session 1 / 1 • 10 min`;
  </script>
</body>
</html>
